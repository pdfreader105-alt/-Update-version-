<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>المعجم الثلاثي — আরবি বাংলা ইংরেজি অভিধান</title>
<meta name="description" content="আরবি-বাংলা-ইংরেজি ত্রিভাষিক অভিধান — ১৭৯৩টি শব্দ" />

<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0c3d2c" />

<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
<link rel="shortcut icon" href="favicon.ico" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />

<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="المعجم الثلاثي" />
<meta name="mobile-web-app-capable" content="yes" />

<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-root">

    <header class="app-header">
      <div class="header-pattern" aria-hidden="true"></div>
      <svg class="corner corner-tl" viewBox="0 0 80 80" fill="none"><path d="M2 40C2 18.9 18.9 2 40 2M40 2c0 12-9.5 21.5-21.5 21.5M40 2c-12 0-21.5 9.5-21.5 21.5M18.5 23.5C18.5 33.6 10.6 41.5 2 41.5" stroke="currentColor" stroke-width="1" opacity="0.55"/><circle cx="40" cy="2" r="2" fill="currentColor" opacity="0.7"/><circle cx="2" cy="40" r="2" fill="currentColor" opacity="0.7"/></svg>
      <svg class="corner corner-tr" viewBox="0 0 80 80" fill="none"><path d="M2 40C2 18.9 18.9 2 40 2M40 2c0 12-9.5 21.5-21.5 21.5M40 2c-12 0-21.5 9.5-21.5 21.5M18.5 23.5C18.5 33.6 10.6 41.5 2 41.5" stroke="currentColor" stroke-width="1" opacity="0.55"/><circle cx="40" cy="2" r="2" fill="currentColor" opacity="0.7"/><circle cx="2" cy="40" r="2" fill="currentColor" opacity="0.7"/></svg>

      <div class="header-inner">
        <div class="brand-row">
          <div class="brand-mark">
            <svg width="30" height="30" viewBox="0 0 40 40" fill="none">
              <path d="M20 4C11 10 6 17 6 24c0 8 6 13 14 13s14-5 14-13c0-7-5-14-14-20z" stroke="currentColor" stroke-width="1.4"/>
              <path d="M20 12v18M13 21h14" stroke="currentColor" stroke-width="1.1" opacity="0.7"/>
            </svg>
          </div>
          <div class="brand-text">
            <h1 dir="rtl" lang="ar">المعجم الثلاثي</h1>
            <p style="display:none;"><span id="total-count">0</span></p>
          </div>
        </div>

        <div class="search-row">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="search-input" class="search-input" placeholder="শব্দ খুঁজুন — আরবি, বাংলা বা ইংরেজিতে..." autocomplete="off" />
          <button id="clear-search" class="clear-btn" aria-label="খুঁজুন মুছে ফেলুন">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </button>
        </div>
      </div>

      <div class="unit-bar" id="unit-bar">
        <button class="unit-toggle" id="unit-toggle">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
          <span class="unit-toggle-label" id="unit-toggle-label">সব শব্দ</span>
          <span class="unit-count-pill" id="unit-toggle-count">0</span>
          <svg id="unit-chevron" class="chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    </header>

    <div class="install-banner" id="install-banner">
      <span>এই অ্যাপটি হোম স্ক্রিনে ইনস্টল করুন</span>
      <button id="install-btn">ইনস্টল করুন</button>
      <button class="dismiss" id="dismiss-install" aria-label="বন্ধ করুন">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <div class="unit-menu-backdrop" id="unit-menu-backdrop">
      <div class="unit-menu">
        <div class="unit-menu-header">
          <span>ইউনিট নির্বাচন করুন</span>
          <button class="icon-btn" id="close-unit-menu">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </button>
        </div>
        <div class="unit-menu-list" id="unit-menu-list"></div>
      </div>
    </div>

    <main class="main-area">
      <div class="view active" id="view-dict"></div>
      <div class="view" id="view-fav"></div>
      <div class="view" id="view-practice"></div>
    </main>

    <nav class="bottom-nav">
      <button class="nav-btn active" id="nav-dict" data-tab="dict">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        <span>অভিধান</span>
      </button>
      <button class="nav-btn" id="nav-fav" data-tab="fav">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.29 1.5 4.04 3 5.5l7 7Z"/></svg>
        <span>প্রিয়</span>
      </button>
      <button class="nav-btn" id="nav-practice" data-tab="practice">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.9 5.8L4 11l5.8 1.9L12 19l1.9-5.8L20 11l-5.8-2.2L12 3z"/></svg>
        <span>অনুশীলন</span>
      </button>
    </nav>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
